    <section>
      <div class="post" id="post">
        <div class="post-image-wrapper">
          <img class="post-image">
        </div>
        <div class="post-body">
          <p><a class="post-title"></a></p>
          <p class="post-description"></p>
          <p class="post-info">
            <span class="post-publicationDate"></span>
            <span class="post-author"></span>
          </p>
        </div>
      </div>
    </section>

    <section>
      <div class="top" id="top">
        <h2>Top 10 Posts</h2>
        <p class="subtitle">by views from <span class="start"></span> to <span class="end"></span></p>
        <div class="top-chart"></div>
      </div>
    </section>
